<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Россия — Страна Возможностей | П-118 · ТюмГУ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--gold:#c9a84c;--gold2:#e8c97a;--red:#c0392b;--blue:#1a3a6b;--dark:#060912;--dark2:#0c1020;--dark3:#121828;--light:#f0ece0;--gray:#7a7e96;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--light);font-family:'Inter',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--gold);}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:1rem 3rem;background:rgba(6,9,18,0.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,0.12);}
.nav-logo{display:flex;align-items:center;gap:.6rem;}
.nav-dot{width:7px;height:7px;background:var(--gold);border-radius:50%;animation:pulse 2s infinite;}
.nav-title{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600;}
.nav-links{display:flex;gap:1.5rem;list-style:none;}
.nav-links a{color:rgba(240,236,224,.5);text-decoration:none;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;transition:color .3s;}
.nav-links a:hover{color:var(--gold);}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:9rem 4rem 3rem;position:relative;overflow:hidden;}
.hero-bg-img{position:absolute;inset:0;}
.hero-bg-img img{width:100%;height:100%;object-fit:cover;opacity:.15;}
.hero-grad{position:absolute;inset:0;background:linear-gradient(135deg,rgba(6,9,18,.96) 0%,rgba(6,9,18,.75) 50%,rgba(6,9,18,.9) 100%);}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);background-size:80px 80px;}
.flag{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#fff 33.33%,#1a3a6b 33.33%,#1a3a6b 66.66%,#c0392b 66.66%);}
.hero-content{position:relative;z-index:2;max-width:800px;animation:fadeUp 1s ease both;}
.hero-tag{display:inline-flex;align-items:center;gap:.6rem;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);color:var(--gold);font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;padding:.5rem 1rem;margin-bottom:2rem;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,7vw,6.5rem);font-weight:900;line-height:1.02;margin-bottom:1rem;}
.h1a{display:block;color:var(--light);}
.h1b{display:block;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:italic;}
.hero-thesis{font-size:1rem;color:rgba(240,236,224,.65);line-height:1.8;max-width:560px;margin-bottom:.75rem;border-left:2px solid var(--gold);padding-left:1.5rem;}
.hero-hyp{font-size:.85rem;color:var(--gold);font-style:italic;margin-bottom:2.5rem;padding-left:1.5rem;}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:0;}
.btn-g{background:var(--gold);color:var(--dark);font-family:'Inter',sans-serif;font-weight:700;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;padding:.9rem 2rem;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:all .3s;}
.btn-g:hover{background:var(--gold2);transform:translateY(-2px);}
.btn-o{background:transparent;color:var(--light);font-family:'Inter',sans-serif;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;padding:.9rem 2rem;border:1px solid rgba(240,236,224,.2);cursor:pointer;text-decoration:none;display:inline-block;transition:all .3s;}
.btn-o:hover{border-color:var(--gold);color:var(--gold);}
.hero-stats{width:100%;margin-top:2.5rem;position:relative;z-index:2;display:flex;flex-wrap:wrap;background:rgba(12,16,32,.92);border-top:1px solid rgba(201,168,76,.1);}
.hs{flex:1;min-width:33.33%;padding:1rem;text-align:center;border-right:1px solid rgba(201,168,76,.08);}
.hs:last-child{border-right:none;}
.hs-num{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--gold);display:block;line-height:1;}
.hs-label{font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gray);margin-top:.3rem;}
.fdiv{height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.2),transparent);}
.sw{max-width:1200px;margin:0 auto;padding:7rem 3rem;}
.stag{font-size:.6rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:.75rem;}
.stitle{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:700;line-height:1.2;margin-bottom:1rem;}
.ssub{color:var(--gray);font-size:.88rem;line-height:1.8;max-width:580px;}
.sh{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:4rem;flex-wrap:wrap;gap:2rem;}
.hyp-box{background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.15);padding:3rem;position:relative;overflow:hidden;margin-top:2.5rem;}
.hyp-box::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(to bottom,var(--gold),var(--red));}
.hyp-label{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
.hyp-text{font-family:'Playfair Display',serif;font-style:italic;font-size:1.25rem;line-height:1.7;margin-bottom:1.5rem;}
.hyp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;}
.hyp-item h4{font-size:.82rem;font-weight:600;margin-bottom:.4rem;color:var(--gold);}
.hyp-item p{font-size:.78rem;color:var(--gray);line-height:1.6;}
.facts-bg{background:var(--dark2);}
.fstrip{background:linear-gradient(90deg,var(--red),var(--blue));display:flex;justify-content:space-around;flex-wrap:wrap;padding:1.5rem 3rem;gap:1rem;}
.fsi{text-align:center;}
.fsi-num{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;color:#fff;display:block;line-height:1;}
.fsi-label{font-size:.57rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.65);}
.img-b{position:relative;overflow:hidden;}
.img-b img{width:100%;height:100%;object-fit:cover;transition:transform .6s;}
.img-b:hover img{transform:scale(1.04);}
.img-ovl{position:absolute;inset:0;}
.img-txt{position:absolute;bottom:0;left:0;right:0;padding:2rem;}
.itag{font-size:.58rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem;}
.ititle{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;margin-bottom:.35rem;}
.idesc{font-size:.77rem;color:rgba(255,255,255,.72);line-height:1.6;}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.05);}
.mc{padding:2.5rem 2rem;position:relative;overflow:hidden;background:var(--dark);transition:background .3s;}
.mc:hover{background:var(--dark3);}
.mc-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.06;transition:opacity .3s;}
.mc:hover .mc-bg{opacity:.13;}
.mc-num{font-family:'Playfair Display',serif;font-size:5rem;font-weight:900;color:rgba(201,168,76,.08);position:absolute;top:.5rem;right:1rem;line-height:1;}
.mc-icon{font-size:2rem;margin-bottom:1.5rem;position:relative;}
.mc h3{font-size:.88rem;font-weight:600;margin-bottom:.6rem;position:relative;}
.mc p{font-size:.77rem;color:var(--gray);line-height:1.7;position:relative;}
.res-bg{background:var(--dark2);}
.lbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);margin-bottom:3rem;}
.live-badge{display:flex;align-items:center;gap:.6rem;font-size:.67rem;letter-spacing:.15em;text-transform:uppercase;color:#44ff88;}
.ldot{width:7px;height:7px;background:#44ff88;border-radius:50%;animation:pulse 1.5s infinite;box-shadow:0 0 8px #44ff88;}
.upd-btn{background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Inter',sans-serif;font-size:.67rem;letter-spacing:.15em;text-transform:uppercase;padding:.5rem 1.2rem;cursor:pointer;transition:all .3s;}
.upd-btn:hover{background:var(--gold);color:var(--dark);}
.bsep{display:flex;align-items:center;gap:1.5rem;margin:3rem 0 2rem;padding-bottom:1rem;border-bottom:1px solid rgba(201,168,76,.12);}
.bnum{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;color:rgba(201,168,76,.15);line-height:1;flex-shrink:0;}
.btxt{font-size:.63rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem;}
.cb{background:var(--dark);border:1px solid rgba(255,255,255,.06);padding:1.8rem;position:relative;transition:border-color .3s;}
.cb:hover{border-color:rgba(201,168,76,.25);}
.cb.full{grid-column:1/-1;}
.cbqn{font-size:.57rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gray);margin-bottom:.3rem;}
.cbq{font-family:'Playfair Display',serif;font-size:.9rem;margin-bottom:1.2rem;line-height:1.4;}
.cbw{position:relative;height:210px;}
.cbw.tall{height:270px;}
.cbf{margin-top:.8rem;display:flex;justify-content:space-between;font-size:.67rem;color:var(--gray);}
.cbf b{color:var(--gold);}
.loading-b{display:flex;flex-direction:column;align-items:center;gap:1.5rem;padding:5rem;color:var(--gray);font-size:.82rem;}
.spinn{width:36px;height:36px;border:2px solid rgba(201,168,76,.12);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
.proof-bg{background:var(--dark);}
.proof-claim{padding:4rem;margin-bottom:3rem;text-align:center;position:relative;overflow:hidden;border:1px solid rgba(201,168,76,.2);}
.pcbg{position:absolute;inset:0;background-size:cover;background-position:center;}
.pcovl{position:absolute;inset:0;background:linear-gradient(135deg,rgba(6,9,18,.9),rgba(26,58,107,.75),rgba(192,57,43,.5),rgba(6,9,18,.88));}
.pctxt{position:relative;z-index:1;}
.pctxt h2{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(1.2rem,2.5vw,1.9rem);line-height:1.6;max-width:800px;margin:0 auto 1rem;}
.pctxt p{font-size:.87rem;color:rgba(240,236,224,.6);max-width:580px;margin:0 auto;}
.asg{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-bottom:3rem;}
.asc{padding:2.5rem;text-align:center;border:1px solid;position:relative;overflow:hidden;}
.asc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.asc-g{border-color:rgba(201,168,76,.2);background:rgba(201,168,76,.04);}
.asc-g::after{background:var(--gold);}
.asc-b{border-color:rgba(74,158,255,.25);background:rgba(74,158,255,.04);}
.asc-b::after{background:#4a9eff;}
.asc-r{border-color:rgba(192,57,43,.25);background:rgba(192,57,43,.04);}
.asc-r::after{background:var(--red);}
.asc-label{font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;margin-bottom:1rem;}
.asc-num{font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:900;line-height:1;display:block;}
.asc-desc{font-size:.79rem;color:var(--gray);margin-top:.75rem;line-height:1.5;}
.fv-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:2px;}
.fv-card{position:relative;overflow:hidden;height:320px;}
.fv-card img{width:100%;height:100%;object-fit:cover;transition:transform .6s;}
.fv-card:hover img{transform:scale(1.04);}
.fv-ovl{position:absolute;inset:0;}
.fv-cnt{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:2.5rem;}
.fv-tag{font-size:.57rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:.5rem;}
.fv-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;margin-bottom:.5rem;}
.fv-desc{font-size:.78rem;color:rgba(255,255,255,.7);line-height:1.6;}
.fv-bar{display:flex;align-items:center;gap:.75rem;margin-top:1rem;}
.fv-track{flex:1;height:2px;background:rgba(255,255,255,.15);border-radius:1px;}
.fv-fill{height:100%;border-radius:1px;}
.fv-pct{font-size:.8rem;font-weight:700;}
.fv-sub{display:grid;grid-template-rows:1fr 1fr;gap:2px;}
.fv-sc{position:relative;overflow:hidden;}
.fv-sc img{width:100%;height:100%;object-fit:cover;}
.fv-scnt{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:1.8rem;}
.b3g{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:2px;}
.b3c{padding:2.5rem;position:relative;overflow:hidden;}
.b3cbg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.08;}
.b3cc{position:relative;z-index:1;}
.b3icon{font-size:2.5rem;margin-bottom:1.2rem;}
.b3c h4{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:.75rem;}
.b3c p{font-size:.79rem;color:var(--gray);line-height:1.7;}
.b3prog{margin-top:1.5rem;}
.b3plabel{display:flex;justify-content:space-between;font-size:.67rem;color:var(--gray);margin-bottom:.4rem;}
.b3track{height:3px;background:rgba(255,255,255,.06);border-radius:2px;}
.b3fill{height:100%;border-radius:2px;width:0%;transition:width 1.5s ease;}
.conc-bg{background:var(--dark2);}
.conc-hero{position:relative;overflow:hidden;padding:5rem;margin-bottom:3rem;text-align:center;}
.ch-img{position:absolute;inset:0;background-size:cover;background-position:center;}
.ch-ovl{position:absolute;inset:0;background:linear-gradient(135deg,rgba(6,9,18,.88),rgba(26,58,107,.72),rgba(192,57,43,.5),rgba(6,9,18,.88));}
.ch-body{position:relative;z-index:1;}
.ch-body h2{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(1.2rem,2.5vw,2rem);line-height:1.6;max-width:800px;margin:0 auto 1rem;}
.ch-body p{font-size:.87rem;color:rgba(240,236,224,.6);max-width:600px;margin:0 auto;}
.cc-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
.cc-card{background:var(--dark);border:1px solid rgba(255,255,255,.06);padding:2.5rem;display:flex;gap:1.5rem;transition:all .3s;}
.cc-card:hover{border-color:rgba(201,168,76,.25);transform:translateY(-3px);}
.cc-num{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;color:rgba(201,168,76,.15);line-height:1;flex-shrink:0;}
.cc-body h4{font-size:.9rem;font-weight:600;color:var(--gold);margin-bottom:.5rem;}
.cc-body p{font-size:.79rem;color:var(--gray);line-height:1.7;}
.auth-bg{background:var(--dark3);border-top:1px solid rgba(201,168,76,.1);}
.auth-card{background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.12);padding:3rem;position:relative;overflow:hidden;}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),var(--blue),var(--gold));}
.auth-name{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3.5vw,3rem);font-weight:900;line-height:1.1;margin-bottom:1.5rem;}
.auth-name span{background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.auth-info{display:flex;align-items:center;gap:.75rem;font-size:.82rem;color:var(--gray);margin-bottom:.5rem;}
.auth-info em{color:var(--gold);font-style:normal;}
.like-btn{display:inline-flex;align-items:center;gap:1rem;background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--light);font-family:'Inter',sans-serif;padding:1rem 2rem;cursor:pointer;transition:all .3s;font-size:.84rem;}
.like-btn:hover,.like-btn.liked{border-color:rgba(192,57,43,.5);background:rgba(192,57,43,.07);}
.like-num{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);padding:.25rem .7rem;font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);}
.det-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);padding:2rem;position:relative;}
.det-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),var(--blue),var(--gold));}
.drow{display:flex;align-items:center;gap:1.5rem;padding:.9rem 0;border-bottom:1px solid rgba(255,255,255,.05);}
.drow:last-child{border-bottom:none;}
.dlabel{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);width:90px;flex-shrink:0;}
.dval{font-size:.85rem;}
.ss{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.05);margin-top:3rem;}
.ssi{background:var(--dark2);padding:1.8rem;text-align:center;}
.ssi-num{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;display:block;line-height:1;margin-bottom:.4rem;}
.ssi-label{font-size:.57rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);}
footer{background:var(--dark);border-top:1px solid rgba(255,255,255,.04);padding:1.8rem 3rem;display:flex;align-items:center;justify-content:space-between;}
footer p{font-size:.67rem;color:rgba(122,126,150,.6);}
.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease;}
.reveal.on{opacity:1;transform:translateY(0);}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){
  nav{padding:1rem 1.5rem;}
  .nav-links{display:none;}
  .hero{padding:6rem 1.2rem 2rem;}
  .hero h1{font-size:2.2rem;}
  .hero-tag{font-size:.52rem;padding:.35rem .7rem;flex-wrap:wrap;}
  .hero-thesis,.hero-hyp{font-size:.82rem;}
  .hero-btns{flex-direction:column;gap:.7rem;}
  .btn-g,.btn-o{text-align:center;}
  .hero-stats{grid-template-columns:repeat(3,1fr)!important;margin-top:1.5rem;}
  .hs{padding:.7rem .3rem;}
  .hs-num{font-size:1.2rem;}
  .hs-label{font-size:.45rem;letter-spacing:.08em;}
  .sw{padding:4rem 1.2rem;}
  .hyp-grid{grid-template-columns:1fr;}
  .fv-grid{grid-template-columns:1fr;}
  .fv-sub{grid-template-rows:auto auto;}
  .cc-grid{grid-template-columns:1fr;}
  .asg{grid-template-columns:1fr;}
  .mg{grid-template-columns:1fr 1fr;}
  .b3g{grid-template-columns:1fr;}
  .ss{grid-template-columns:1fr 1fr;}
  .cg{grid-template-columns:1fr;}
  .cb.full{grid-column:1;}
  .facts-mosaic{grid-template-columns:1fr!important;}
  .sh{flex-direction:column;gap:1rem;}
  .auth-card{padding:2rem 1.5rem;}
  .det-card{padding:1.5rem;}
},{threshold:0.08});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
loadData();
setInterval(loadData,30000);
</script>
</body>
</html>
